{% extends "base.html" %}
{% block title %}Reset password - Address Book Portal{% endblock %}
{% block content %}
<section class="mx-auto max-w-md">
  <div class="panel">
    <h1 class="panel-title">Reset password</h1>
    <form method="post" class="stack">
      {% csrf_token %}
      {% for field in form %}
        {% include "partials/field.html" with field=field %}
      {% endfor %}
      <button class="button-primary w-full" type="submit">Send reset email</button>
    </form>
  </div>
</section>
{% endblock %}
