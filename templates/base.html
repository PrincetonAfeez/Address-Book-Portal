{% load static %}
<!doctype html>
<html lang="en" class="h-full">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="csrf-token" content="{{ csrf_token }}">
  <title>{% block title %}Address Book Portal{% endblock %}</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <script src="https://unpkg.com/lucide@0.469.0"></script>
  <link rel="stylesheet" href="{% static 'css/app.css' %}">
</head>
<body class="min-h-full bg-slate-50 text-slate-950 antialiased">
  <div class="min-h-screen">
    <header class="border-b border-slate-200 bg-white">
      <div class="mx-auto flex max-w-7xl items-center justify-between gap-4 px-4 py-4 sm:px-6 lg:px-8">
        <a href="{% url 'contacts:dashboard' %}" class="flex items-center gap-3 font-semibold tracking-normal text-slate-950">
          <span class="grid h-9 w-9 place-items-center rounded bg-emerald-600 text-sm font-bold text-white">AB</span>
          <span>Address Book Portal</span>
        </a>
        <nav class="flex items-center gap-2 text-sm">
          {% if user.is_authenticated %}
            <a class="nav-link" href="{% url 'contacts:dashboard' %}">Dashboard</a>
            <a class="nav-link" href="{% url 'contacts:list' %}">Contacts</a>
            <a class="nav-link" href="{% url 'contacts:organization' %}">Organize</a>
            <a class="nav-link" href="{% url 'contacts:csv_import' %}">Import</a>
            <form method="post" action="{% url 'logout' %}">
              {% csrf_token %}
              <button class="icon-button" type="submit" title="Log out" aria-label="Log out">
                <i data-lucide="log-out"></i>
              </button>
            </form>
          {% else %}
            <a class="nav-link" href="{% url 'login' %}">Log in</a>
            <a class="button-primary" href="{% url 'signup' %}">Sign up</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <div id="toast-stack" class="fixed right-4 top-20 z-50 space-y-2">
        {% include "partials/messages.html" %}
      </div>
      {% block content %}{% endblock %}
    </main>
  </div>

  <div id="modal-root"></div>

  <script>
    document.body.addEventListener("htmx:configRequest", (event) => {
      const token = document.querySelector("meta[name='csrf-token']").content;
      event.detail.headers["X-CSRFToken"] = token;
    });
    document.body.addEventListener("htmx:afterSettle", () => {
      if (window.lucide) window.lucide.createIcons();
    });
    if (window.lucide) window.lucide.createIcons();
  </script>
</body>
</html>
