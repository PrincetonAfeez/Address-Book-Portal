<label class="block">
  <span class="mb-1 block text-sm font-medium text-slate-700">{{ field.label }}</span>
  {{ field }}
  {% if field.help_text %}
    <span class="mt-1 block text-xs text-slate-500">{{ field.help_text }}</span>
  {% endif %}
  {% for error in field.errors %}
    <span class="mt-1 block text-xs font-medium text-rose-700">{{ error }}</span>
  {% endfor %}
</label>
