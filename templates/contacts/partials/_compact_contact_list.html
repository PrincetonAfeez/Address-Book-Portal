<div class="space-y-3">
  {% for contact in contacts %}
    <a class="compact-row" href="{{ contact.get_absolute_url }}">
      <span class="avatar">{{ contact.initials }}</span>
      <span class="min-w-0 flex-1">
        <span class="block truncate font-medium">{{ contact.display_name }}</span>
        <span class="block truncate text-xs text-slate-500">{{ contact.company|default:"No company" }}</span>
      </span>
    </a>
  {% empty %}
    <p class="empty-state">{{ empty }}</p>
  {% endfor %}
</div>
