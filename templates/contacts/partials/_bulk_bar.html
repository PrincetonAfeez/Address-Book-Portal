{% if selected_count %}
<form id="bulk-bar" class="flex flex-wrap items-center gap-2"
      hx-post="{% url 'contacts:bulk_action' %}?{{ request.GET.urlencode }}"
      hx-target="#contact-table-body"
      hx-swap="innerHTML"
      hx-indicator="#table-indicator"
      {% if oob %}hx-swap-oob="outerHTML"{% endif %}>
  <input type="hidden" name="list_mode" value="{{ mode }}">
  <span class="text-sm font-medium text-slate-700">{{ selected_count }} selected</span>
  {{ bulk_form.action }}
  {{ bulk_form.group }}
  {{ bulk_form.tag }}
  <button class="icon-button" type="submit" title="Apply bulk action" aria-label="Apply bulk action"
          hx-on:click="const action = this.form.querySelector('[name=action]'); if (action && action.value === 'delete' && !confirm('Permanently delete the selected contacts? This cannot be undone.')) { event.preventDefault(); event.stopPropagation(); }">
    <i data-lucide="play"></i>
  </button>
  {% if show_clear|default:True %}
  <button class="icon-button" type="button" title="Clear selection" aria-label="Clear selection"
          hx-post="{% url 'contacts:selection_clear' %}?{{ request.GET.urlencode }}"
          hx-target="#contact-table-body"
          hx-swap="innerHTML"
          hx-indicator="#table-indicator"
          hx-vals='{"list_mode": "{{ mode }}"}'>
    <i data-lucide="x"></i>
  </button>
  {% endif %}
</form>
{% else %}
<div id="bulk-bar"{% if oob %} hx-swap-oob="outerHTML"{% endif %}></div>
{% endif %}
