{% load querystring %}
<div class="fixed inset-0 z-40 grid place-items-center bg-slate-950/40 p-4">
  <div class="max-h-[90vh] w-full max-w-2xl overflow-y-auto rounded border border-slate-200 bg-white shadow-xl">
    <div class="flex items-center justify-between border-b border-slate-200 px-5 py-4">
      <h2 class="panel-title">{% if contact %}Edit contact{% else %}Add contact{% endif %}</h2>
      <button class="icon-button" type="button" title="Close" aria-label="Close" onclick="document.getElementById('modal-root').innerHTML = ''">
        <i data-lucide="x"></i>
      </button>
    </div>
    <form class="stack p-5" method="post" enctype="multipart/form-data"
          hx-post="{% if contact %}{% url 'contacts:edit' contact.pk %}{% else %}{% url 'contacts:create' %}{% endif %}{% if list_mode %}{% qs_with list_mode=list_mode %}{% endif %}"
          {% if list_mode %}hx-target="#contact-table-body" hx-swap="innerHTML"{% endif %}
          hx-indicator="#modal-indicator">
      {% csrf_token %}
      {% if list_mode %}<input type="hidden" name="list_mode" value="{{ list_mode }}">{% endif %}
      {% include "partials/form_errors.html" with form=form %}
      {% include "contacts/partials/_contact_form_fields.html" with show_organization=True %}
      <div class="flex items-center justify-end gap-2 border-t border-slate-200 pt-4">
        <span id="modal-indicator" class="htmx-indicator text-sm text-slate-500">Saving…</span>
        <button class="button-secondary" type="button" onclick="document.getElementById('modal-root').innerHTML = ''">Cancel</button>
        <button class="button-primary" type="submit">Save</button>
      </div>
    </form>
  </div>
</div>
