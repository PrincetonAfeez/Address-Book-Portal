<div class="stack">
  <h2 class="panel-title">{% if contact %}Edit contact{% else %}Add contact{% endif %}</h2>
  <form class="stack" method="post" enctype="multipart/form-data"
        action="{% if contact %}{% url 'contacts:edit' contact.pk %}{% else %}{% url 'contacts:create' %}{% endif %}">
    {% csrf_token %}
    {% include "partials/form_errors.html" with form=form %}
    {% include "contacts/partials/_contact_form_fields.html" with show_organization=False %}
    <div class="flex justify-end gap-2 border-t border-slate-200 pt-4">
      <a class="button-secondary" href="{% if contact %}{{ contact.get_absolute_url }}{% else %}{% url 'contacts:list' %}{% endif %}">Cancel</a>
      <button class="button-primary" type="submit">Save</button>
    </div>
  </form>
</div>
