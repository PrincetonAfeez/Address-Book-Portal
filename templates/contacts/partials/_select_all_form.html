<div id="select-all-form"
     {% if oob %}hx-swap-oob="outerHTML"{% endif %}>
  {% for contact in contacts %}
    <input type="hidden" name="contact_ids" value="{{ contact.id }}">
  {% endfor %}
  <input type="hidden" name="list_mode" value="{{ mode }}">
  <input type="hidden" name="selected" value="{% if page_all_selected %}false{% else %}true{% endif %}">
  <input type="checkbox"
         aria-label="Select all on page"
         {% if page_all_selected %}checked{% endif %}
         hx-post="{% url 'contacts:selection_page' %}?{{ request.GET.urlencode }}"
         hx-target="#contact-table-body"
         hx-swap="innerHTML"
         hx-indicator="#table-indicator"
         hx-include="#select-all-form">
</div>
